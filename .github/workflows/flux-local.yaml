---
name: Flux Local

on:
  pull_request:
    branches: [main]
    paths:
      - "kubernetes/**"
      - ".github/workflows/flux-local.yaml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FLUX_VERSION: "2.8.8"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Flux Local Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.8.8
        with:
          version: ${{ env.FLUX_VERSION }}
          token: ${{ github.token }}

      - name: Run flux-local test
        uses: docker://ghcr.io/allenporter/flux-local:v8.2.0@sha256:9c77739d8d7c71b808311693ea52d603d1ddb5190d3d4f23e47f6f33d5254602
        with:
          args: >-
            test
            --all-namespaces
            --enable-helm
            --path /github/workspace/kubernetes/clusters
            --sources "flux-system=."
            --verbose
            --skip-invalid-kustomization-paths

  diff:
    name: Flux Local Diff
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        cluster:
          - aks-bjjeire-dev-swn-01
          - aks-bjjeire-stg-swn-01
          - aks-bjjeire-prod-swn-01
        resource: ["helmrelease", "kustomization"]
      fail-fast: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pull
          persist-credentials: false

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: default
          persist-credentials: false

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.8.8
        with:
          version: ${{ env.FLUX_VERSION }}
          token: ${{ github.token }}

      - name: Run flux-local diff
        uses: docker://ghcr.io/allenporter/flux-local:v8.2.0@sha256:9c77739d8d7c71b808311693ea52d603d1ddb5190d3d4f23e47f6f33d5254602
        with:
          args: >-
            diff ${{ matrix.resource }}
            --unified 6
            --path /github/workspace/pull/kubernetes/clusters/${{ matrix.cluster }}
            --path-orig /github/workspace/default/kubernetes/clusters/${{ matrix.cluster }}
            --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart"
            --limit-bytes 10000
            --all-namespaces
            --sources "flux-system=."
            --output-file diff.patch
            --skip-invalid-kustomization-paths

      - name: Generate diff output
        id: diff
        run: |
          {
            echo "diff<<EOF"
            cat diff.patch 2>/dev/null || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Add PR comment
        if: ${{ steps.diff.outputs.diff != '' }}
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: ${{ github.event.pull_request.number }}/kubernetes/${{ matrix.cluster }}/${{ matrix.resource }}
          message: |
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```
