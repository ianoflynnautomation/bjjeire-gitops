---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bjj-eire
  namespace: bjjeire-app
spec:
  values:
    seeder:
      dataset: "test"
    bjj-mongodb:
      mongodb:
        persistence:
          storageClassName: default
          size: 20Gi
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
    bjj-api:
      api:
        replicaCount: 1
        env:
          ASPNETCORE_ENVIRONMENT: Staging
          OTEL_RESOURCE_ATTRIBUTES__deployment.environment: staging
          RateLimitOptions__PermitLimit: "30"
          RateLimitOptions__WindowInSeconds: "10"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 3
          targetCPUUtilizationPercentage: 70
    bjj-frontend:
      frontend:
        replicaCount: 1
        resources:
          limits:
            cpu: 300m
            memory: 384Mi
          requests:
            cpu: 100m
            memory: 192Mi
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 2
          targetCPUUtilizationPercentage: 70
          targetMemoryUtilizationPercentage: 80
