---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # - ../../base/actions-runner-system
  - ../../base/external-secrets
  - ../../base/istio-egress
  - ../../base/istio-ingress
  - ../../base/istio-system
  - ../../base/observability
  - ../../base/flux-system/repositories
  - ../../base/network-system
  - ../../base/bjj-eire
  - ../../base/kyverno
  - ../../base/external-secrets/external-secrets/ks.yaml
  # - ../../base/actions-runner-system/gha-runner-scale-set/ks.yaml
  # - ../../base/actions-runner-system/gha-runner-scale-set-controller/ks.yaml
  - ../../base/flux-system/flux-instance/ks.yaml
  - ../../base/network-system/external-dns/ks.yaml
  - ../../base/network-system/cert-manager/ks.yaml
  - ../../base/network-system/cloudflare-tunnel/ks.yaml
  - ../../base/observability/grafana/ks.yaml
  - ../../base/observability/kube-prometheus-stack/ks.yaml
  # - ../../base/observability/kiali/ks.yaml
  - ../../base/observability/oauth2-proxy/ks.yaml
  # Tempo disabled in prod for cost — re-enable together with the
  # opentelemetry-collector and grafana-instance patches below.
  # - ../../base/observability/tempo/ks.yaml
  - ../../base/observability/loki/ks.yaml
  - ../../base/observability/opentelemetry-collector/ks.yaml
  - ../../base/observability/routes/ks.yaml
  - ../../base/istio-system/istio-base/k8.yaml
  - ../../base/istio-system/gateway-api/k8.yaml
  - ../../base/istio-system/istio-cni/k8.yaml
  - ../../base/istio-system/istiod/k8.yaml
  - ../../base/istio-system/ztunnel/k8.yaml
  - ../../base/istio-system/monitoring/ks.yaml
  - ../../base/istio-ingress/config/ks.yaml
  - ../../base/istio-egress/config/ks.yaml
  - ../../base/istio-system/policy/ks.yaml
  - ../../base/bjj-eire/ks.yaml
  - ../../base/kyverno/ks.yaml

patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: bjj-eire
      namespace: flux-system
    patch: |
      - op: replace
        path: /spec/path
        value: ./kubernetes/apps/overlays/aks-bjjeire-prod-swn-01/bjj-eire

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: observability-routes
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: observability-routes
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HTTPRoute
              name: kiali
            patch: |
              $patch: delete
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: kiali
                namespace: observability

  # Tempo is disabled in prod: drop the tempo dependency and remove the
  # traces pipeline so the collector still reconciles for metrics/logs.
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: opentelemetry-collector
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: opentelemetry-collector
        namespace: flux-system
      spec:
        dependsOn:
          - name: kube-prometheus-stack
          - name: istiod
          - name: loki
        patches:
          - target:
              kind: HelmRelease
              name: opentelemetry-collector
            patch: |
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: opentelemetry-collector
                namespace: observability
              spec:
                values:
                  config:
                    exporters:
                      otlp/tempo: null
                    service:
                      pipelines:
                        traces: null

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: grafana-instance
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: grafana-instance
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: GrafanaDatasource
              name: tempo
            patch: |
              $patch: delete
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDatasource
              metadata:
                name: tempo
                namespace: observability
          - target:
              kind: GrafanaDashboard
              name: bjjeire-acceptance-tests
            patch: |
              $patch: delete
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: bjjeire-acceptance-tests
                namespace: observability
