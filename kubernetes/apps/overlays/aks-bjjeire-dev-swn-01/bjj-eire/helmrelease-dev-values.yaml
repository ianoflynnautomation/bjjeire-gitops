---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bjj-eire
  namespace: bjjeire-app
spec:
  values:
    seeder:
      dataset: "test"
    bjj-mongodb:
      mongodb:
        persistence:
          storageClassName: default
          size: 10Gi
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
    bjj-api:
      api:
        replicaCount: 1
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ""
          ASPNETCORE_ENVIRONMENT: Development
          OTEL_RESOURCE_ATTRIBUTES__deployment.environment: dev
          ServiceDefaults__EnablePrometheus: "false"
          RateLimitOptions__PermitLimit: "30"
          RateLimitOptions__WindowInSeconds: "10"
        podAnnotations:
          prometheus.io/scrape: "false"
        resources:
          limits:
            cpu: 300m
            memory: 384Mi
          requests:
            cpu: 50m
            memory: 128Mi
        autoscaling:
          enabled: false
    bjj-frontend:
      frontend:
        replicaCount: 1
        # Caddy binary in the image has cap_net_bind_service+ep via setcap.
        # With allowPrivilegeEscalation:false + drop ALL, the kernel sets
        # no_new_privs and refuses exec ("operation not permitted"). Granting
        # NET_BIND_SERVICE in the container lets the kernel skip the
        # file-cap elevation path on exec.
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        podAnnotations:
          prometheus.io/scrape: "false"
        autoscaling:
          enabled: false
