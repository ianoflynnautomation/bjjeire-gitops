---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/actions-runner-system
  - ../../base/external-secrets
  - ../../base/istio-egress
  - ../../base/istio-ingress
  - ../../base/istio-system
  # Observability stack disabled in dev for cost. Re-enable for incident replay.
  # - ../../base/observability
  - ../../base/flux-system/repositories
  - ../../base/network-system
  - ../../base/bjj-eire
  - ../../base/kyverno
  - ../../base/external-secrets/external-secrets/ks.yaml
  - ../../base/actions-runner-system/gha-runner-scale-set/ks.yaml
  - ../../base/actions-runner-system/gha-runner-scale-set-controller/ks.yaml
  # flux-instance-extras dependsOn grafana + kube-prometheus-stack; disabled in dev.
  # - ../../base/flux-system/flux-instance/ks.yaml
  - ../../base/network-system/external-dns/ks.yaml
  - ../../base/network-system/cert-manager/ks.yaml
  # Cloudflare Tunnel is dev's only ingress — no public Azure LB.
  - ../../base/network-system/cloudflare-tunnel/ks.yaml
  # - ../../base/observability/grafana/ks.yaml
  # - ../../base/observability/kube-prometheus-stack/ks.yaml
  # - ../../base/observability/kiali/ks.yaml
  # - ../../base/observability/oauth2-proxy/ks.yaml
  # - ../../base/observability/opentelemetry-collector/ks.yaml
  # - ../../base/observability/routes/ks.yaml
  - ../../base/istio-system/istio-base/k8.yaml
  - ../../base/istio-system/gateway-api/k8.yaml
  - ../../base/istio-system/istio-cni/k8.yaml
  - ../../base/istio-system/istiod/k8.yaml
  # - ../../base/istio-system/monitoring/ks.yaml
  - ../../base/istio-ingress/config/ks.yaml
  - ../../base/istio-egress/config/ks.yaml
  - ../../base/istio-system/policy/ks.yaml
  - ../../base/bjj-eire/ks.yaml
  - ../../base/bjj-eire/image-automation/ks.yaml
  - ../../base/kyverno/ks.yaml

patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: bjj-eire
      namespace: flux-system
    patch: |
      - op: replace
        path: /spec/path
        value: ./kubernetes/apps/overlays/aks-bjjeire-dev-swn-01/bjj-eire
      - op: replace
        path: /spec/dependsOn
        value:
          - name: external-secrets-stores

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: cert-manager
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: cert-manager
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: PrometheusRule
              name: cert-manager-rules
            patch: |
              $patch: delete
              apiVersion: monitoring.coreos.com/v1
              kind: PrometheusRule
              metadata:
                name: cert-manager-rules
                namespace: network-system
          - target:
              kind: HelmRelease
              name: cert-manager
            patch: |
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: cert-manager
                namespace: network-system
              spec:
                values:
                  prometheus:
                    servicemonitor:
                      enabled: false

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: istio-policies
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: istio-policies
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: AuthorizationPolicy
              name: allow-ingress-to-grafana
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-ingress-to-grafana
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: allow-ingress-to-prometheus
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-ingress-to-prometheus
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: allow-ingress-to-kiali
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-ingress-to-kiali
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: require-entra-auth-observability
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: require-entra-auth-observability
                namespace: istio-ingress
