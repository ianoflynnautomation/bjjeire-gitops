---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/actions-runner-system
  - ../../base/external-secrets
  - ../../base/istio-egress
  - ../../base/istio-ingress
  - ../../base/istio-system
  # Observability stack disabled in dev for cost.
  # - ../../base/observability
  - ../../base/flux-system/repositories
  - ../../base/network-system
  - ../../base/bjj-eire
  - ../../base/kyverno
  - ../../base/external-secrets/external-secrets/ks.yaml
  - ../../base/actions-runner-system/gha-runner-scale-set/ks.yaml
  - ../../base/actions-runner-system/gha-runner-scale-set-controller/ks.yaml
  # - ../../base/flux-system/flux-instance/ks.yaml
  - ../../base/network-system/external-dns/ks.yaml
  - ../../base/network-system/cert-manager/ks.yaml
  # Cloudflare Tunnel is dev's only ingress — no public Azure LB.
  - ../../base/network-system/cloudflare-tunnel/ks.yaml
  # - ../../base/observability/grafana/ks.yaml
  # - ../../base/observability/kube-prometheus-stack/ks.yaml
  # - ../../base/observability/kiali/ks.yaml
  # - ../../base/observability/oauth2-proxy/ks.yaml
  # - ../../base/observability/opentelemetry-collector/ks.yaml
  # - ../../base/observability/routes/ks.yaml
  - ../../base/istio-system/istio-base/k8.yaml
  - ../../base/istio-system/gateway-api/k8.yaml
  - ../../base/istio-system/istio-cni/k8.yaml
  - ../../base/istio-system/istiod/k8.yaml
  # Ambient mode (dev only): ztunnel dataplane + ambient profile patches below.
  - ../../base/istio-system/ztunnel/k8.yaml
  - ambient/ks.yaml
  # - ../../base/istio-system/monitoring/ks.yaml
  - ../../base/istio-ingress/config/ks.yaml
  - ../../base/istio-egress/config/ks.yaml
  - ../../base/istio-system/policy/ks.yaml
  - ../../base/bjj-eire/ks.yaml
  - ../../base/bjj-eire/image-automation/ks.yaml
  - ../../base/kyverno/ks.yaml

patches:
  # Enroll the app namespace in ambient: ztunnel handles mTLS + L4 policy,
  # no sidecar injection, Jobs (seeder) complete normally.
  - target:
      kind: Namespace
      name: bjjeire-app
    patch: |
      - op: add
        path: /metadata/labels/istio.io~1dataplane-mode
        value: ambient

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: istio-gateway-config
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: istio-gateway-config
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: Gateway
              name: istio-ingressgateway
            patch: |
              - op: add
                path: /spec/listeners/-
                value:
                  name: https-root-wildcard
                  port: 443
                  protocol: HTTPS
                  hostname: "api-dev.${ROOT_DOMAIN}"
                  tls:
                    mode: Terminate
                    certificateRefs:
                      - name: wildcard-tls-secret
                        namespace: network-system
                        kind: Secret
                  allowedRoutes:
                    namespaces:
                      from: Selector
                      selector:
                        matchLabels:
                          gateway-access: "true"

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: istiod
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: istiod
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HelmRelease
              name: istiod
            patch: |
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: istiod
                namespace: istio-system
              spec:
                values:
                  profile: ambient

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: istio-cni
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: istio-cni
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HelmRelease
              name: istio-cni
            patch: |
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: istio-cni
                namespace: istio-system
              spec:
                values:
                  profile: ambient

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: bjj-eire
      namespace: flux-system
    patch: |
      - op: replace
        path: /spec/path
        value: ./kubernetes/apps/overlays/aks-bjjeire-dev-swn-01/bjj-eire
      - op: replace
        path: /spec/dependsOn
        value:
          - name: external-secrets-stores

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: cert-manager
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: cert-manager
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: PrometheusRule
              name: cert-manager-rules
            patch: |
              $patch: delete
              apiVersion: monitoring.coreos.com/v1
              kind: PrometheusRule
              metadata:
                name: cert-manager-rules
                namespace: network-system
          - target:
              kind: GrafanaDashboard
              name: cert-manager
            patch: |
              $patch: delete
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: cert-manager
                namespace: network-system
          - target:
              kind: HelmRelease
              name: cert-manager
            patch: |
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: cert-manager
                namespace: network-system
              spec:
                values:
                  prometheus:
                    servicemonitor:
                      enabled: false

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: external-dns
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: external-dns
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: GrafanaDashboard
              name: cloudflare-tunnels
            patch: |
              $patch: delete
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: cloudflare-tunnels
                namespace: network-system
          - target:
              kind: HelmRelease
              name: external-dns
            patch: |
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: external-dns
                namespace: network-system
              spec:
                values:
                  serviceMonitor:
                    enabled: false

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: external-secrets
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: external-secrets
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: GrafanaDashboard
              name: external-secrets
            patch: |
              $patch: delete
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: external-secrets
                namespace: external-secrets

  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: istio-policies
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: istio-policies
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: AuthorizationPolicy
              name: allow-ingress-to-grafana
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-ingress-to-grafana
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: allow-ingress-to-prometheus
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-ingress-to-prometheus
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: allow-ingress-to-kiali
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-ingress-to-kiali
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: require-entra-auth-observability
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: require-entra-auth-observability
                namespace: istio-ingress
          - target:
              kind: AuthorizationPolicy
              name: allow-observability-internal
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-observability-internal
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: allow-ingress-to-oauth2-proxy
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-ingress-to-oauth2-proxy
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: allow-otlp-ingest-to-otel-collector
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-otlp-ingest-to-otel-collector
                namespace: observability
          - target:
              kind: AuthorizationPolicy
              name: allow-apiserver-to-prometheus-operator-webhook
            patch: |
              $patch: delete
              apiVersion: security.istio.io/v1
              kind: AuthorizationPolicy
              metadata:
                name: allow-apiserver-to-prometheus-operator-webhook
                namespace: observability
          - target:
              kind: Telemetry
              name: mesh-default
            patch: |
              $patch: delete
              apiVersion: telemetry.istio.io/v1
              kind: Telemetry
              metadata:
                name: mesh-default
                namespace: istio-system
