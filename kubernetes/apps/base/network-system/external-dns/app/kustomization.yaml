---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # dev has no grafana-operator — the dev overlay deletes this via Flux patch
  - grafanadashboard.yaml
  - dnsendpoint-crd.yaml
  - helmrelease.yaml
  - ocirepository.yaml
  - caa-records.yaml
  # - prometheusrule.yaml

configMapGenerator:
  - name: external-dns-values
    namespace: network-system
    files:
      - values.yaml=./values.yaml

configurations:
  - kustomizeconfig.yaml
