---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ${PRIVATE_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: CLOUDFLARE_API_TOKEN
        selector:
          # ${ROOT_DOMAIN} (e.g. bjjeire.com) covers itself and every subdomain
          # — including *.${ROOT_DOMAIN} and *.${CLUSTER_DOMAIN} — so a single
          # Cloudflare solver handles the wildcard cert. Requires the Cloudflare
          # API token to have Zone.DNS:Edit on ${ROOT_DOMAIN}.
          dnsZones:
            - ${ROOT_DOMAIN}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${PRIVATE_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: CLOUDFLARE_API_TOKEN
        selector:
          # ${ROOT_DOMAIN} (e.g. bjjeire.com) covers itself and every subdomain
          # — including *.${ROOT_DOMAIN} and *.${CLUSTER_DOMAIN} — so a single
          # Cloudflare solver handles the wildcard cert. Requires the Cloudflare
          # API token to have Zone.DNS:Edit on ${ROOT_DOMAIN}.
          dnsZones:
            - ${ROOT_DOMAIN}
