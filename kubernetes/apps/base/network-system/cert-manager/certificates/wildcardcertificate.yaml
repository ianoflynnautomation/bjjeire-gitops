---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-tls
  namespace: network-system
spec:
  secretName: wildcard-tls-secret
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    # Single-level wildcard under the root zone covers everything the
    # convention emits: <env>.<root>, api-<env>.<root>, <env_id>.<root>,
    # api-<env_id>.<root>, etc. Issued via DNS-01.
    - "*.${ROOT_DOMAIN}"
    - "${ROOT_DOMAIN}"
    # Two-level wildcard kept during the cutover so existing HTTPRoutes
    # on *.${CLUSTER_DOMAIN} keep working. Drop once nothing routes through
    # these hostnames any more. ${CLUSTER_DOMAIN} itself is omitted — Let's
    # Encrypt rejects it as redundant with *.${ROOT_DOMAIN}.
    - "*.${CLUSTER_DOMAIN}"
