---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pr-env-janitor
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: "./kubernetes/apps/base/pr-env-janitor"
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
