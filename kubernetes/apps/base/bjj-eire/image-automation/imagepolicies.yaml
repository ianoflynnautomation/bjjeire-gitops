---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: bjjeire-api
  namespace: bjj-app
spec:
  imageRepositoryRef:
    name: bjjeire-api
    namespace: bjj-app
  filterTags:
    pattern: '^v(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: "$version"
  policy:
    semver:
      range: ">=0.1.0"

