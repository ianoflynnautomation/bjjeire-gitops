---
# Commits updated image tags to a dedicated branch (flux/image-updates) whenever an
# ImagePolicy selects a new tag. A PR from that branch into main is then reviewed before
# merging — preventing Flux from committing directly to the protected main branch.
# The markers in helmrelease.yaml — # {"$imagepolicy": "bjj-app:bjjeire-api:tag"} —
# tell Flux which field to rewrite.
#
# Requires the flux-system GitRepository to have write access to the repo
# (deploy key or GitHub App with contents:write).
# Set up a branch protection rule: require a PR for main, exempt flux bot from push.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: bjj-eire
  namespace: bjj-app
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxbot@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |
        chore(flux): update bjj-eire image tags

        {{range .Updated.Images -}}
        - {{.}}
        {{end -}}
    push:
      branch: flux/image-updates
  update:
    path: "./kubernetes/apps/base/bjj-eire/app"
    strategy: Setters
