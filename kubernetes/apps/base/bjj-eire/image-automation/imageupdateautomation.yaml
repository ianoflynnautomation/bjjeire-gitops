---
# Commits updated image tags directly to main whenever an ImagePolicy
# selects a new tag. The markers in helmrelease.yaml —
# # {"$imagepolicy": "bjj-app:bjjeire-api:tag"} — tell Flux which field
# to rewrite.
#
# Requires the flux-system GitRepository to have write access to the repo
# (GitHub App with contents:write).
#
# If you later want PR-review on tag bumps:
#   push.branch: flux/image-updates
# and add branch protection on main that requires a PR.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: bjj-eire
  namespace: bjj-app
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxbot@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |
        chore(flux): update bjj-eire image tags

        {{ range $resource, $changes := .Changed.Objects -}}
        {{ range $changes -}}
        - {{ $resource.Kind }}/{{ $resource.Name }}: {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
        {{ end -}}
    push:
      branch: main
  update:
    path: "./kubernetes/apps/base/bjj-eire/app"
    strategy: Setters
