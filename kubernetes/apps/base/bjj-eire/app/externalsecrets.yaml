---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bjj-mongodb-root-password
  namespace: bjj-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-store
  target:
    name: bjj-mongodb-root-password
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        mongodb-password: "{{ .mongodb_password }}"
  data:
    - secretKey: mongodb_password
      remoteRef:
        key: bjj-mongodb-root-password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bjj-api-kestrel-cert-password
  namespace: bjj-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-store
  target:
    name: bjj-api-kestrel-cert-password
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        cert-password: "{{ .cert_password }}"
  data:
    - secretKey: cert_password
      remoteRef:
        key: bjj-api-kestrel-cert-password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bjj-api-kestrel-cert-secret
  namespace: bjj-app
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-store
  target:
    name: bjj-api-kestrel-cert-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        aspnetapp.pfx: "{{ .pfx_b64 | b64dec }}"
  data:
    - secretKey: pfx_b64
      remoteRef:
        key: bjj-api-kestrel-pfx

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bjj-azure-ad-secret
  namespace: bjj-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-store
  target:
    name: bjj-azure-ad-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        AzureAd__TenantId: "{{ .tenant_id }}"
        AzureAd__ClientId: "{{ .client_id }}"
        AzureAd__Audience: "{{ .audience }}"
  data:
    - secretKey: tenant_id
      remoteRef:
        key: bjj-azure-ad-tenant-id
    - secretKey: client_id
      remoteRef:
        key: bjj-azure-ad-client-id
    - secretKey: audience
      remoteRef:
        key: bjj-azure-ad-audience

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: bjj-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-store
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "ianoflynnautomation:%s" .ghcr_pat | b64enc }}"}}}
  data:
    - secretKey: ghcr_pat
      remoteRef:
        key: ghcr-pat

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bjj-donation-secret
  namespace: bjj-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-store
  target:
    name: bjj-donation-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        Donation__BitcoinAddress: "{{ .bitcoin_address }}"
  data:
    - secretKey: bitcoin_address
      remoteRef:
        key: bjj-donation-bitcoin-address
