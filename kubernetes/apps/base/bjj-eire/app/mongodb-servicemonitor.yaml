---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bjj-mongodb
  namespace: bjjeire-app
  labels:
    app.kubernetes.io/name: bjj-mongodb
    app.kubernetes.io/part-of: bjj-eire
spec:
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: bjj-mongodb
      app.kubernetes.io/component: exporter
  namespaceSelector:
    matchNames:
      - bjjeire-app
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 15s
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod

