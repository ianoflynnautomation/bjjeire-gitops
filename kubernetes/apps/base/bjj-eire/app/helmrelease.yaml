---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bjj-eire
  namespace: bjj-app
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: bjj-eire
  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  rollback:
    recreate: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  valuesFrom:
    - kind: Secret
      name: bjj-azure-ad-secret
      valuesKey: AzureAd__TenantId
      targetPath: bjj-api.api.env.AzureAd__TenantId
    - kind: Secret
      name: bjj-azure-ad-secret
      valuesKey: AzureAd__ClientId
      targetPath: bjj-api.api.env.AzureAd__ClientId
    - kind: Secret
      name: bjj-azure-ad-secret
      valuesKey: AzureAd__Audience
      targetPath: bjj-api.api.env.AzureAd__Audience
    - kind: Secret
      name: bjj-donation-secret
      valuesKey: Donation__BitcoinAddress
      targetPath: bjj-api.api.env.Donation__BitcoinAddress

  values:
    bjj-mongodb:
      mongodb:
        persistence:
          storageClassName: managed-premium
          size: 50Gi
        resources:
          limits:
            cpu: 2000m
            memory: 2Gi
          requests:
            cpu: 1000m
            memory: 1Gi
      secrets:
        mongodbRootPassword:
          enabled: true
          create: false
          name: bjj-mongodb-root-password
          key: mongodb-password

    bjj-api:
      api:
        image:
          repository: ghcr.io/ianoflynnautomation/bjjeire-api
          tag: 0.1.0 # {"$imagepolicy": "bjj-app:bjjeire-api:tag"}
          pullPolicy: IfNotPresent
        imagePullSecrets:
          - name: ghcr-pull-secret
        replicaCount: 2
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/path: "/metrics"
          prometheus.io/port: "80"
        env:
          ASPNETCORE_ENVIRONMENT: Production
          ASPNETCORE_URLS: "http://+:80"
          ASPNETCORE_HTTP_PORT: "80"
          CorsOptions__AllowedOrigins: "https://${CLUSTER_DOMAIN},https://www.${CLUSTER_DOMAIN}"
          CorsOptions__AllowedMethods: "GET,POST,PUT,DELETE"
          CorsOptions__AllowedHeaders: "Authorization,Content-Type"
          RateLimitOptions__EnableRateLimiting: "true"
          RateLimitOptions__PermitLimit: "5"
          RateLimitOptions__WindowInSeconds: "10"
          RateLimitOptions__RejectionStatusCode: "429"
          CacheOptions__DefaultExpirationMinutes: "5"
          CompetitionDeactivation__Interval: "1.00:00:00"
          CompetitionDeactivation__InitialDelay: "00:00:30"
          FeatureManagement__BjjEvents: "true"
          FeatureManagement__Gyms: "true"
          FeatureManagement__Stores: "true"
          FeatureManagement__Competitions: "true"
          ServiceDefaults__ServiceName: "BjjEire.Api"
          ServiceDefaults__EnablePrometheus: "true"
          AzureAd__Instance: "https://login.microsoftonline.com/"
          Serilog__Properties__Application: "BjjWorld.Api"
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
          OTEL_RESOURCE_ATTRIBUTES__service.name: "BjjWorld.Api"
          OTEL_RESOURCE_ATTRIBUTES__deployment.environment: "Production"
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 10
          targetCPUUtilizationPercentage: 70
      secrets:
        mongodbRootPassword:
          enabled: true
          create: false
          name: bjj-mongodb-root-password
          key: mongodb-password
      kestrelCert:
        enabled: false
      ingress:
        enabled: false

    bjj-frontend:
      frontend:
        image:
          repository: ghcr.io/ianoflynnautomation/bjjeire-frontend
          tag: 0.1.0 # {"$imagepolicy": "bjj-app:bjjeire-frontend:tag"}
          pullPolicy: IfNotPresent
        imagePullSecrets:
          - name: ghcr-pull-secret
        replicaCount: 2
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/path: "/metrics"
          prometheus.io/port: "80"
        env:
          NODE_ENV: production
          PORT: "80"
          SERVICES_API_HTTP_0: "http://bjj-api.bjj-app.svc.cluster.local:80"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 6
          targetCPUUtilizationPercentage: 70
          targetMemoryUtilizationPercentage: 80
        waitForApi:
          enabled: true
          apiUrl: "http://bjj-api.bjj-app.svc.cluster.local:80/health"
      ingress:
        enabled: false
    seeder:
      enabled: true
      image:
        repository: ghcr.io/ianoflynnautomation/bjjeire-seeder
        tag: 0.1.0 # {"$imagepolicy": "bjj-app:bjjeire-seeder:tag"}
        pullPolicy: IfNotPresent
      hookPolicy: "post-install,post-upgrade"
      mongodb:
        host: bjj-mongodb
        port: 27017
        user: admin
        database: Mongodb
        secretName: bjj-mongodb-root-password
        secretKey: mongodb-password
