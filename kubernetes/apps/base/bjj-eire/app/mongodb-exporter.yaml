---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bjj-mongodb-exporter
  namespace: bjjeire-app
  labels:
    app.kubernetes.io/name: bjj-mongodb
    app.kubernetes.io/component: exporter
    app.kubernetes.io/part-of: bjj-eire
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bjj-mongodb
      app.kubernetes.io/component: exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bjj-mongodb
        app.kubernetes.io/component: exporter
        app.kubernetes.io/part-of: bjj-eire
    spec:
      automountServiceAccountToken: false
      containers:
        - name: mongodb-exporter
          image: percona/mongodb_exporter:0.51.0
          imagePullPolicy: IfNotPresent
          args:
            - --mongodb.uri=mongodb://bjj-mongodb:27017/admin
            - --collect-all
            - --compatible-mode
          env:
            - name: MONGODB_USER
              value: admin
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bjj-mongodb-root-password
                  key: mongodb-password
          ports:
            - name: metrics
              containerPort: 9216
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: bjj-mongodb-exporter
  namespace: bjjeire-app
  labels:
    app.kubernetes.io/name: bjj-mongodb
    app.kubernetes.io/component: exporter
    app.kubernetes.io/part-of: bjj-eire
spec:
  selector:
    app.kubernetes.io/name: bjj-mongodb
    app.kubernetes.io/component: exporter
  ports:
    - name: metrics
      port: 9216
      targetPort: metrics
      protocol: TCP

