---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bjj-api
  namespace: bjjeire-app
  labels:
    app.kubernetes.io/name: bjj-api
    app.kubernetes.io/part-of: bjj-eire
spec:
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: bjj-api
  namespaceSelector:
    matchNames:
      - bjjeire-app
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
