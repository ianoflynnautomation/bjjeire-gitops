---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ztunnel
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  path: "./kubernetes/apps/base/istio-system/ztunnel/app"
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: istio-system
  dependsOn:
    - name: istiod
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: ztunnel
      namespace: istio-system
