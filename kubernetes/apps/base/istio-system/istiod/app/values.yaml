---
revision: ""

env:
  MCS_API_GROUP: ""

global:
  istioNamespace: istio-system
  proxy:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi
    accessLogFile: /dev/stdout
    accessLogEncoding: JSON
    lifecycle:
      preStop:
        exec:
          command:
            - /bin/sh
            - -c
            - sleep 5
  logging:
    level: "default:info"

pilot:
  autoscaleEnabled: true
  autoscaleMin: 1
  autoscaleMax: 5
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  podDisruptionBudget:
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app: istiod
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: "CriticalAddonsOnly"
      operator: "Exists"
  env:
    PILOT_ENABLE_STATUS: "true"

sidecarInjectorWebhook:
  enableNamespacesByDefault: false

meshConfig:
  accessLogFile: /dev/stdout
  accessLogEncoding: JSON
  enableAutoMtls: true
  trustDomain: cluster.local
  rootNamespace: istio-system

  defaultConfig:
    holdApplicationUntilProxyStarts: true
    gatewayTopology:
      numTrustedProxies: 1

  outboundTrafficPolicy:
    mode: REGISTRY_ONLY

  extensionProviders:
    - name: otel-tracing
      opentelemetry:
        service: otel-collector.observability.svc.cluster.local
        port: 4317
    - name: prometheus
      prometheus: {}
    - name: oauth2-proxy
      envoyExtAuthzHttp:
        service: oauth2-proxy.observability.svc.cluster.local
        port: 4180
        includeRequestHeadersInCheck:
          - cookie
          - authorization
        headersToUpstreamOnAllow:
          - authorization
          - x-auth-request-user
          - x-auth-request-email
          - x-auth-request-groups
        headersToDownstreamOnDeny:
          - content-type
          - set-cookie
          - location
          - authorization
        headersToDownstreamOnAllow:
          - set-cookie
