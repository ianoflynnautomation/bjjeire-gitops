---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # dev has no grafana-operator — the dev overlay deletes this via Flux patch
  - grafanadashboard.yaml
  - helmrelease.yaml
  - ocirepository.yaml

configMapGenerator:
  - name: external-secrets-values
    files:
      - values.yaml=./values.yaml

configurations:
  - kustomizeconfig.yaml
