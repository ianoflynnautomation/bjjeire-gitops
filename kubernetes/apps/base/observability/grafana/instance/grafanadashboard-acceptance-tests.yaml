---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: bjjeire-acceptance-tests
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  json: |
    {
      "annotations": {"list": []},
      "description": "Acceptance-test trends from the bjjeire-tests OTel reporter (TraceQL metrics over Tempo). Requires the full observability profile; span attributes are set in src/shared/otel/otel-reporter.ts.",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Tests Executed",
          "id": 1,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.status != nil} | count_over_time()", "queryType": "traceql", "refId": "A"}],
          "options": {"reduceOptions": {"calcs": ["sum"]}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}, "overrides": []},
          "gridPos": {"h": 4, "w": 5, "x": 0, "y": 0}
        },
        {
          "type": "stat",
          "title": "Failures",
          "id": 2,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.outcome=\"unexpected\"} | count_over_time()", "queryType": "traceql", "refId": "A"}],
          "options": {"reduceOptions": {"calcs": ["sum"]}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "noValue": "0", "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "red", "value": 1}]}}, "overrides": []},
          "gridPos": {"h": 4, "w": 5, "x": 5, "y": 0}
        },
        {
          "type": "stat",
          "title": "Flaky (passed on retry)",
          "id": 3,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.outcome=\"flaky\"} | count_over_time()", "queryType": "traceql", "refId": "A"}],
          "options": {"reduceOptions": {"calcs": ["sum"]}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "noValue": "0", "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 1}]}}, "overrides": []},
          "gridPos": {"h": 4, "w": 5, "x": 10, "y": 0}
        },
        {
          "type": "stat",
          "title": "Suite Runs (shards)",
          "id": 4,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.run.status != nil} | count_over_time()", "queryType": "traceql", "refId": "A"}],
          "options": {"reduceOptions": {"calcs": ["sum"]}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}, "overrides": []},
          "gridPos": {"h": 4, "w": 5, "x": 15, "y": 0}
        },
        {
          "type": "stat",
          "title": "p95 Test Duration",
          "id": 5,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.status != nil} | quantile_over_time(duration, .95)", "queryType": "traceql", "refId": "A"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 2}, "overrides": []},
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Test Results Over Time (by outcome)",
          "id": 6,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.status != nil} | count_over_time() by (span.test.outcome)", "queryType": "traceql", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "bars", "fillOpacity": 60, "stacking": {"mode": "normal"}}}, "overrides": [{"matcher": {"id": "byRegexp", "options": ".*unexpected.*"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}, {"matcher": {"id": "byRegexp", "options": ".*flaky.*"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "yellow"}}]}, {"matcher": {"id": "byRegexp", "options": ".*expected.*"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}]},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}
        },
        {
          "type": "timeseries",
          "title": "Failures by Project",
          "id": 7,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.outcome=\"unexpected\"} | count_over_time() by (span.test.project)", "queryType": "traceql", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "bars", "fillOpacity": 60, "stacking": {"mode": "normal"}}}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}
        },
        {
          "type": "timeseries",
          "title": "p95 Test Duration by Project",
          "id": 8,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.status != nil} | quantile_over_time(duration, .95) by (span.test.project)", "queryType": "traceql", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "fillOpacity": 10}}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}
        },
        {
          "type": "timeseries",
          "title": "Suite Run Duration (p50 / p95)",
          "id": 9,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.run.status != nil} | quantile_over_time(duration, .5, .95)", "queryType": "traceql", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "fillOpacity": 10}}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}
        },
        {
          "type": "table",
          "title": "Recent Failed Tests (click trace ID to open)",
          "id": 10,
          "datasource": {"type": "tempo", "uid": "tempo"},
          "targets": [{"query": "{resource.service.name=\"bjjeire-acceptance-tests\" && span.test.outcome=\"unexpected\"}", "queryType": "traceql", "tableType": "spans", "limit": 50, "refId": "A"}],
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 20}
        }
      ],
      "refresh": "5m",
      "schemaVersion": 41,
      "tags": ["bjj-eire", "testing"],
      "templating": {"list": []},
      "time": {"from": "now-24h", "to": "now"},
      "timezone": "browser",
      "title": "BJJ Eire Acceptance Tests",
      "uid": "bjjeire-tests-v1",
      "version": 1
    }
