---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: observability
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: opentelemetry-collector
  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  rollback:
    recreate: true
    force: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  values:
    image:
      repository: otel/opentelemetry-collector-contrib
    mode: daemonset

    podAnnotations:
      sidecar.istio.io/inject: "true"

    presets:
      logsCollection:
        enabled: true
        includeCollectorLogs: false
      kubernetesAttributes:
        enabled: true

    resources:
      requests:
        cpu: 75m
        memory: 192Mi
      limits:
        cpu: 400m
        memory: 512Mi

    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        filelog:
          exclude:
            - /var/log/pods/*_bjj-api-*/*/*.log

      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 400
          spike_limit_mib: 100
        batch:
          send_batch_size: 1000
          timeout: 10s

      exporters:
        prometheus:
          endpoint: 0.0.0.0:8889
          resource_to_telemetry_conversion:
            enabled: true
        otlp/tempo:
          endpoint: tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true
        otlphttp/loki:
          endpoint: http://loki-gateway.observability.svc.cluster.local/otlp

      service:
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, k8sattributes, batch]
            exporters: [prometheus]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, k8sattributes, batch]
            exporters: [otlp/tempo]
          logs:
            receivers: [otlp, filelog]
            processors: [memory_limiter, k8sattributes, batch]
            exporters: [otlphttp/loki]

    ports:
      otlp:
        enabled: true
        containerPort: 4317
        servicePort: 4317
        protocol: TCP
      otlp-http:
        enabled: true
        containerPort: 4318
        servicePort: 4318
        protocol: TCP
      prometheus:
        enabled: true
        containerPort: 8889
        servicePort: 8889
        protocol: TCP

    serviceMonitor:
      enabled: true
      interval: 30s
