---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kyverno
  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  rollback:
    recreate: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/webhooks"]
        target:
          kind: ValidatingWebhookConfiguration
      - paths: ["/webhooks"]
        target:
          kind: MutatingWebhookConfiguration
  maxHistory: 3
  valuesFrom:
    - kind: ConfigMap
      name: kyverno-values
